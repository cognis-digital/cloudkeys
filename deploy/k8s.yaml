apiVersion: apps/v1
kind: Deployment
metadata: { name: cloudkeys, labels: { app: cloudkeys } }
spec:
  replicas: 1
  selector: { matchLabels: { app: cloudkeys } }
  template:
    metadata: { labels: { app: cloudkeys } }
    spec:
      containers:
        - name: cloudkeys
          image: ghcr.io/cognis-digital/cloudkeys:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: cloudkeys }
spec:
  selector: { app: cloudkeys }
  ports: [{ port: 80, targetPort: 8000 }]
